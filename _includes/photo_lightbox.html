<div id="glance" class="glance" hidden role="dialog" aria-modal="true" aria-label="Photo viewer" tabindex="-1">
  <button type="button" class="glance-btn glance-close" aria-label="Close">&#10005;</button>
  <button type="button" class="glance-btn glance-prev" aria-label="Previous photo">&#8249;</button>
  <button type="button" class="glance-btn glance-next" aria-label="Next photo">&#8250;</button>
  <figure class="glance-stage">
    <div class="glance-imgwrap">
      <img class="glance-img" src="" alt="" draggable="false">
      <div class="shield"></div>
    </div>
    <figcaption class="glance-caption">
      <span class="glance-meta">
        <span class="glance-loc"></span>
        <span class="glance-date"></span>
      </span>
      <span class="glance-counter"></span>
    </figcaption>
  </figure>
</div>

<style>
  .glance {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgb(10, 10, 10);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .glance[hidden] {
    display: none;
  }

  .glance:focus {
    outline: none;
  }

  .glance.is-open {
    opacity: 1;
  }

  .glance-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    max-width: 92vw;
  }

  .glance-imgwrap {
    position: relative;
    transform: scale(0.985);
    transition: transform 0.2s ease;
  }

  .glance.is-open .glance-imgwrap {
    transform: scale(1);
  }

  .glance-img {
    display: block;
    max-width: 92vw;
    max-height: 84vh;
    opacity: 0;
    transition: opacity 0.25s ease;
    -webkit-touch-callout: none;
  }

  .glance-img.is-loaded {
    opacity: 1;
  }

  .glance-caption {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    width: 100%;
    padding: 10px 2px 0;
    color: #b5b5b5;
    font-size: 0.85em;
  }

  .glance-meta {
    display: flex;
    gap: 12px;
    min-width: 0;
  }

  .glance-loc {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .glance-date,
  .glance-counter {
    color: #808080;
    white-space: nowrap;
  }

  .glance-btn {
    position: fixed;
    z-index: 1001;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    padding: 0;
    border: none;
    border-radius: 0;
    box-shadow: none;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.7);
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    transition: color 0.15s ease;
  }

  .glance-btn:hover,
  .glance-btn:focus-visible {
    color: #fff;
  }

  .glance-close {
    top: 10px;
    right: 10px;
    font-size: 22px;
  }

  .glance-prev {
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
  }

  .glance-next {
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
  }

  .photo-item .image-wrapper {
    cursor: pointer;
  }

  /* desktop-only hover cue: small expand badge in the photo corner */
  @media (hover: hover) {
    .photo-item .image-wrapper::after {
      content: "\2922";
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 11;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .photo-item .image-wrapper:hover::after {
      opacity: 1;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .glance,
    .glance-img,
    .glance-imgwrap {
      transition: none;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const glance = document.getElementById('glance');
    if (!glance) return;

    const imgEl = glance.querySelector('.glance-img');
    const locEl = glance.querySelector('.glance-loc');
    const dateEl = glance.querySelector('.glance-date');
    const counterEl = glance.querySelector('.glance-counter');
    const closeBtn = glance.querySelector('.glance-close');
    const prevBtn = glance.querySelector('.glance-prev');
    const nextBtn = glance.querySelector('.glance-next');

    let items = [];
    let index = -1;
    let pushedState = false;
    let lastFocused = null;

    function fullSrc(item) {
      const img = item.querySelector('img');
      return item.dataset.full || (img && img.getAttribute('src')) || '';
    }

    function filenameOf(item) {
      return fullSrc(item).split('/').pop();
    }

    function isOpen() {
      return !glance.hidden;
    }

    function render() {
      const item = items[index];
      if (!item) return;
      const gridImg = item.querySelector('img');
      imgEl.classList.remove('is-loaded');
      imgEl.src = fullSrc(item);
      imgEl.alt = (gridImg && gridImg.alt) || '';
      locEl.textContent = item.dataset.location || '';
      dateEl.textContent = item.dataset.datelabel || '';
      counterEl.textContent = (index + 1) + ' / ' + items.length;
      // preload neighbours for instant navigation
      [index - 1, index + 1].forEach(function(i) {
        const n = items[(i + items.length) % items.length];
        if (n && n !== item) new Image().src = fullSrc(n);
      });
    }

    imgEl.addEventListener('load', function() {
      imgEl.classList.add('is-loaded');
    });

    function open(item) {
      // one continuous sequence across every grid on the page
      // (Selected Moments flows into All Moments and wraps around)
      items = Array.from(document.querySelectorAll('.photo-grid .photo-item'));
      index = items.indexOf(item);
      if (index < 0) return;
      lastFocused = document.activeElement;
      glance.hidden = false;
      requestAnimationFrame(function() { glance.classList.add('is-open'); });
      document.body.style.overflow = 'hidden';
      render();
      if (!pushedState) {
        try {
          history.pushState({ glance: true }, '',
            '#g-' + encodeURIComponent(filenameOf(item)));
          pushedState = true;
        } catch (e) { /* file:// etc. */ }
      }
      glance.focus();
    }

    function close(fromPopstate) {
      glance.classList.remove('is-open');
      glance.hidden = true;
      imgEl.removeAttribute('src');
      imgEl.classList.remove('is-loaded');
      document.body.style.overflow = '';
      if (pushedState && !fromPopstate) history.back();
      pushedState = false;
      if (lastFocused && lastFocused.focus) lastFocused.focus();
    }

    function nav(dir) {
      if (!items.length) return;
      index = (index + dir + items.length) % items.length;
      render();
      if (pushedState) {
        try {
          history.replaceState({ glance: true }, '',
            '#g-' + encodeURIComponent(filenameOf(items[index])));
        } catch (e) { /* ignore */ }
      }
    }

    document.querySelectorAll('.photo-grid .photo-item').forEach(function(item) {
      item.addEventListener('click', function() { open(item); });
    });

    closeBtn.addEventListener('click', function() { close(false); });
    prevBtn.addEventListener('click', function() { nav(-1); });
    nextBtn.addEventListener('click', function() { nav(1); });

    glance.addEventListener('click', function(e) {
      if (e.target.closest('.glance-imgwrap') ||
          e.target.closest('.glance-btn') ||
          e.target.closest('.glance-caption')) return;
      close(false);
    });

    document.addEventListener('keydown', function(e) {
      if (!isOpen()) return;
      if (e.key === 'Escape') {
        close(false);
      } else if (e.key === 'ArrowLeft') {
        nav(-1);
      } else if (e.key === 'ArrowRight') {
        nav(1);
      } else if (e.key === 'Tab') {
        // keep focus among the lightbox controls
        const focusables = [closeBtn, prevBtn, nextBtn];
        const i = focusables.indexOf(document.activeElement);
        e.preventDefault();
        const next = e.shiftKey
          ? focusables[(i - 1 + focusables.length) % focusables.length]
          : focusables[(i + 1) % focusables.length];
        next.focus();
      }
    });

    let touchX = null, touchY = null;
    glance.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
      }
    }, { passive: true });
    glance.addEventListener('touchend', function(e) {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      const dy = e.changedTouches[0].clientY - touchY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        nav(dx < 0 ? 1 : -1);
      }
      touchX = touchY = null;
    }, { passive: true });

    window.addEventListener('popstate', function() {
      if (isOpen()) close(true);
    });

    // deep link: #g-<filename> opens that photo in the main grid
    if (location.hash.indexOf('#g-') === 0) {
      const wanted = decodeURIComponent(location.hash.slice(3));
      const mainGrid = document.getElementById('photo-grid-container');
      if (mainGrid) {
        const match = Array.from(mainGrid.querySelectorAll('.photo-item'))
          .find(function(it) { return filenameOf(it) === wanted; });
        if (match) {
          history.replaceState(null, '', location.pathname + location.search);
          open(match);
        }
      }
    }
  });
</script>
